<html>
<head>
  <title>WELCOME TO MAJESTY°° STORE</title>
</head>

<style>
body {
  background-color: mistyrose;
  margin: 0;
  min-height: 100vh;

  display: flex;
  flex-direction: column;
  align-items: center;

  font-family: Arial, sans-serif;
}

/* LOGIN BOX */
.log_in_box {
  background-color: deeppink;
  margin-top: 100px;
  width: 90%;
  max-width: 700px;
  height: 350px;
  display: flex;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.left {
  width: 50%;
  background-color: whitesmoke;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 22px;
  font-weight: bold;
}

.right {
  width: 50%;
  background-color: deeppink;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 20px;
}

.text {
  margin-bottom: 20px;
  color: white;
  text-align: center;
  font-size: 18px;
}

input {
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

/* BUTTON */
.btn {
  padding: 12px;
  background-color: #ffc0cb;
  border-radius: 10px;
  text-align: center;
  text-decoration: none;
  color: black;
  font-weight: bold;
}

.btn:hover {
  background-color: #ff9eb5;
}

/* BELOW CONTENT */
.welcome-text {
  margin-top: 25px;
  color: black;
  font-size: 40px;
  text-align: center;
  font-family: cursive;
}

.tagline {
  color: black;
  margin-top: 5px;
  font-size: 50px;
  text-align: center;
  font-family: cursive;
}

/* PRODUCTS */
.products {
  margin-top: 30px;
  text-align: center;
  color: black;
  font-size:60px;
  font-family: cursive;
}

.products img {
  width: 200px;
  margin: 10px;
  border-radius: 100px;
}

/* SOCIAL */
.social {
  margin-top: 30px;
  color: black;
  text-align: center;
  font-size: 45px;
  font-family: cursive;
}

/* FOOTER */
.footer {
  margin-top: 40px;
  margin-bottom: 20px;
  color: black;
  font-size: 25px
}
</style>

<body>

<!-- LOGIN BOX -->
<div class="log_in_box">
  
  <div class="left">
    <p>WELCOME MAJESTY ✨</p>
  </div>

  <div class="right">
    <h2 class="text">ENTER YOUR BEAUTIFUL NAME!</h2>

    <input type="text" placeholder="NAME MAJESTY">
    <input type="tel" placeholder="PLEASE PHONE NO">

    <a href="home.html" class="btn">SUBMIT</a>
  </div>

</div>

<!-- BELOW CONTENT -->

<h2 class="welcome-text">Welcome to Majesty Store ✨</h2>
<p class="tagline">Your style, your beauty, your choice 💖</p>

<!-- PRODUCTS -->
<div class="products">
  <p>Trending Products 👇</p>
  <img src="stone_necklace.jpg">
  <img src="black_heel.jpg">
  <img src="wood_band.jpg">
</div>

<!-- SOCIAL -->
<div class="social">
  <p>Follow us 💕</p>
  Instagram | WhatsApp | YouTube
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Majesty Store | All Rights Reserved
</div>

</body>
</html>
