<style>

/* BODY */
body {
    margin: 0;
    background: gainsboro;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
}

/* NAVBAR (TOP) */
.navbar {
    width: 100%;
    height: 80px;
    background: linear-gradient(90deg, #ff9eb5, #ff6f91);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.navbar a {
    color: white;
    text-decoration: none;
    font-size: 20px;
    font-weight: bold;
    transition: 0.3s;
}

.navbar a:hover {
    transform: scale(1.1);
}

/* CONTAINER */
.container {
    padding: 20px;
}

/* GRID */
.card-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

/* CARD */
.card {
    width: calc(33.33% - 20px);
    height: 350px;
    background: linear-gradient(145deg, #1a1a1a, #2a2a2a);
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 70%;
    object-fit: cover;
}

/* TEXT */
.card .text {
    height: 30%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

/* BUTTON */
.buy-btn {
    padding: 8px 15px;
    background: #ff6f91;
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.buy-btn:hover {
    background: #ff4d88;
    transform: scale(1.1);
}

/* TABLET */
@media (max-width: 1024px) {
    .card {
        width: calc(50% - 20px);
    }
}

/* MOBILE */
@media (max-width: 768px) {
    .card {
        width: 100%;
    }

    .navbar {
        height: 60px;
        gap: 15px;
        font-size: 14px;
    }
}
.beu{
    color: antiquewhite;
}
a {
    text-decoration: none;
    color: whitesmoke;
}

</style>
</head>
